[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "skill-engine"
version = "0.1.0"
description = "Standalone skill loading, hot-reload, routing, and lifecycle management library"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
skill-engine = "skill_engine.__main__:main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
