[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "aca-core"
version = "0.1.0"
description = "Autonomous Computer Agent — standalone core library"
requires-python = ">=3.10"
dependencies = [
    "psutil>=5.0",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
