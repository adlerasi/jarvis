[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "memory-store"
version = "0.1.0"
description = "JSON-backed key-value store with deep merge, text search, and prompt formatting"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
memory-store = "memory_store.__main__:main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
